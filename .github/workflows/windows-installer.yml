name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 1.2.3)'
        required: false
        default: '0.1.0'

jobs:
  build-windows:
    name: Build and package for Windows
    runs-on: windows-2025-vs2026

    steps:
      # ── 1. Source code ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Qt6 + WebEngine (MSVC build from Qt's official mirrors) ────────
      # Qt WebEngine requires MSVC on Windows (Chromium is MSVC-only).
      # aqtinstall provides pre-built binaries matching the official Qt installer.
      - name: Install Qt6 with WebEngine
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtwebengine qtwebchannel qtpositioning'

      # ── 3. MSVC x64 developer environment ────────────────────────────────
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── 4. Derive version string ──────────────────────────────────────────
      - name: Compute version
        id: version
        shell: bash
        run: |
          echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"

      # ── 5. Configure & build ──────────────────────────────────────────────
      - name: Configure CMake
        shell: pwsh
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: pwsh
        run: cmake --build build -j $env:NUMBER_OF_PROCESSORS

      # ── 6. Stage application files ────────────────────────────────────────
      - name: Deploy Qt DLLs (windeployqt6)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path installer\staging | Out-Null
          Copy-Item build\bin\rgui2.exe installer\staging\

          # Collect all Qt6 and plugin DLLs next to the executable.
          windeployqt6 --release --dir installer\staging installer\staging\rgui2.exe

      - name: Copy runtime data (themes, fonts, R package)
        shell: pwsh
        run: |
          Copy-Item -Recurse gogh-themes  installer\staging\gogh-themes
          Copy-Item -Recurse fonts        installer\staging\fonts
          Copy-Item -Recurse rgui2pkg     installer\staging\rgui2pkg

      # ── 7. NSIS installer ─────────────────────────────────────────────────
      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis --no-progress -y
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH

      - name: Build NSIS installer
        shell: cmd
        run: >
          makensis
          /DAPP_VERSION=${{ steps.version.outputs.version }}
          installer\windows-installer.nsi

      # ── 8. Publish artifacts ──────────────────────────────────────────────
      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: R-GUI-2-${{ steps.version.outputs.version }}-Windows
          path: installer\R-GUI-2-*-Setup.exe
          if-no-files-found: error
