<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  #terminal { width: 100%; height: 100%; }
</style>
<link rel="stylesheet" href="xterm.css">
<script src="xterm.js"></script>
<script src="addon-fit.js"></script>
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
</head>
<body>
<div id="terminal"></div>
<script>
var term = new Terminal({
  fontFamily: 'Hack Nerd Font Mono, Cascadia Code, Menlo, monospace',
  fontSize: 10,
  scrollback: 10000,
  cursorBlink: true
});

var fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);
term.open(document.getElementById('terminal'));
fitAddon.fit();

// Called from C++ resize events – re-fit and report new size to PTY.
window.fitTerminal = function() {
  fitAddon.fit();
  if (window._bridge)
    window._bridge.resizePty(term.cols, term.rows);
};

new QWebChannel(qt.webChannelTransport, function(channel) {
  window._bridge = channel.objects.bridge;

  term.onData(function(data) {
    window._bridge.sendInput(data);
  });

  window._bridge.outputReady.connect(function(b64) {
    var bin = atob(b64);
    var u8 = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
    term.write(u8);
  });

  window._bridge.themeChanged.connect(function(bg, fg, cursor) {
    term.options.theme = { background: bg, foreground: fg, cursor: cursor };
    document.body.style.background = bg;
    document.getElementById('terminal').style.background = bg;
  });

  // Tell C++ we are ready. PTY will be started from there.
  // After ready() returns, call resizePty with actual dimensions.
  window._bridge.ready();
  fitAddon.fit();
  window._bridge.resizePty(term.cols, term.rows);
});
</script>
</body>
</html>
