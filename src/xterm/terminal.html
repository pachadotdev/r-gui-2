<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  #terminal { width: 100%; height: 100%; }
</style>
<link rel="stylesheet" href="xterm.css">
<script src="xterm.js"></script>
<script src="addon-fit.js"></script>
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
</head>
<body>
<div id="terminal"></div>
<script>
var term = new Terminal({
  fontFamily: 'Hack Nerd Font Mono, Cascadia Code, Menlo, monospace',
  fontSize: 16,  // 12pt default (pt × 96/72 = px)
  scrollback: 10000,
  cursorBlink: true
});

var fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);
term.open(document.getElementById('terminal'));
fitAddon.fit();

// Called from C++ resize events – re-fit and report new size to PTY.
window.fitTerminal = function() {
  fitAddon.fit();
  if (window._bridge)
    window._bridge.resizePty(term.cols, term.rows);
};

// Called from C++ Ctrl+/Ctrl- shortcuts.
window.adjustFontSize = function(deltaPt) {
  var currentPt = Math.round(term.options.fontSize * 72 / 96);
  var newPt = Math.max(6, Math.min(32, currentPt + deltaPt));
  term.options.fontSize = Math.round(newPt * 96 / 72);
  fitAddon.fit();
  if (window._bridge)
    window._bridge.resizePty(term.cols, term.rows);
};
window.resetFontSize = function() {
  term.options.fontSize = 16;  // 12pt default
  fitAddon.fit();
  if (window._bridge)
    window._bridge.resizePty(term.cols, term.rows);
};
// Absolute setter so C++ can keep every terminal perfectly in sync.
window.setFontSize = function(pt) {
  var newSize = Math.round(Math.max(6, Math.min(32, pt)) * 96 / 72);
  term.options.fontSize = newSize;
  fitAddon.fit();
  if (window._bridge)
    window._bridge.resizePty(term.cols, term.rows);
};

new QWebChannel(qt.webChannelTransport, function(channel) {
  window._bridge = channel.objects.bridge;

  // Intercept Ctrl+/- inside xterm.js (before chars reach the shell) and
  // route them to C++ so ALL terminals + editors resize together.
  term.attachCustomKeyEventHandler(function(e) {
    if (e.ctrlKey && e.type === 'keydown') {
      if (e.key === '+' || e.key === '=') { window._bridge.fontSizeUp();    return false; }
      if (e.key === '-')                  { window._bridge.fontSizeDown();  return false; }
      if (e.key === '0')                  { window._bridge.fontSizeReset(); return false; }
    }
    return true;
  });

  // Also block the browser's own Ctrl+/- page-zoom (capture phase = before everything).
  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && (e.key === '+' || e.key === '=' || e.key === '-' || e.key === '0'))
      e.preventDefault();
  }, true);

  term.onData(function(data) {
    window._bridge.sendInput(data);
  });

  window._bridge.outputReady.connect(function(b64) {
    var bin = atob(b64);
    var u8 = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
    term.write(u8);
  });

  window._bridge.themeChanged.connect(function(bg, fg, cursor) {
    term.options.theme = { background: bg, foreground: fg, cursor: cursor };
    document.body.style.background = bg;
    document.getElementById('terminal').style.background = bg;
  });

  // Tell C++ we are ready. PTY will be started from there.
  // After ready() returns, call resizePty with actual dimensions.
  window._bridge.ready();
  fitAddon.fit();
  window._bridge.resizePty(term.cols, term.rows);
});
</script>
</body>
</html>
